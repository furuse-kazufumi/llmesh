name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # `[all]` brings in optional protocol drivers (paramiko, pyftpdlib, …) so
        # `import llmesh.protocol` succeeds and the test suite can collect.
        run: pip install -e ".[dev,all]"

      - name: Lint with ruff
        run: ruff check llmesh/

      - name: Run tests with coverage
        run: python -m pytest --cov=llmesh --cov-fail-under=80 -q

      - name: Bandit security scan (medium+ severity)
        run: bandit -r llmesh/ -ll -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
      - name: Verify dist files
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: llmesh-dist
          path: dist/*
