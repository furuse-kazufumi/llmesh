# llmesh/data/origins.toml — bundled package origin database.
#
# Verified manually by the llmesh maintainers. Pull requests welcome
# at https://github.com/furuse-kazufumi/llmesh (or gitee mirror once
# established).
#
# Schema (per package):
#   origin           = "US" | "EU" | "CN" | "JP" | "RU" | "UN" (unknown)
#   maintainer       = free-form attribution
#   verified         = "YYYY-MM-DD" of manual verification
#   notes            = free-form
#   supply_risk      = "low" | "medium" | "high" | "unknown"  (default low)
#   supply_risk_notes = free-form

# ───────────────────────── llmesh direct deps ──────────────────────────

[cryptography]
origin = "US"
maintainer = "Python Cryptographic Authority (PyCA)"
verified = "2026-05-18"
notes = "US foundation but multi-national contributors"

