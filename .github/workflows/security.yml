name: Security

on: [push, pull_request]

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install analysis tools
        run: pip install bandit semgrep

      - name: Bandit (all severities, project config)
        run: bandit -r llmesh/ -c pyproject.toml

      - name: Semgrep (python + command-injection rules)
        run: semgrep --config=p/python --config=p/command-injection llmesh/ --error
